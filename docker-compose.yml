name: cited-market-brief-agent

services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: cited_market_brief_agent
      POSTGRES_PASSWORD: cited_market_brief_agent
      POSTGRES_DB: cited_market_brief_agent
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cited_market_brief_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cited_market_brief_agent
      MINIO_ROOT_PASSWORD: cited-market-brief-agent-dev-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://cited_market_brief_agent:cited_market_brief_agent@db:5432/cited_market_brief_agent
      VALKEY_URL: redis://valkey:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["full"]

  frontend:
    build: ./frontend
    environment:
      # Same-origin model: the client bundle bakes API_URL="/api" (NEXT_PUBLIC_*
      # is inlined at build, which runs unset in the Dockerfile). API_URL feeds the
      # RSC server fetch; BACKEND_ORIGIN is where next.config's /api rewrite proxies
      # to. Both must resolve the backend over the compose network, not localhost.
      API_URL: http://backend:8000
      BACKEND_ORIGIN: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    profiles: ["full"]

  # Phase 1+: Hatchet workflow engine (Postgres-backed). Uncomment when wiring ingestion jobs.
  # hatchet:
  #   image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
  #   ports: ["8888:8888", "7077:7077"]
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pg-data:
  minio-data:
