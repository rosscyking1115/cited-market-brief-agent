name: ledgerbrief

services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ledgerbrief
      POSTGRES_PASSWORD: ledgerbrief
      POSTGRES_DB: ledgerbrief
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerbrief"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ledgerbrief
      MINIO_ROOT_PASSWORD: ledgerbrief-dev-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://ledgerbrief:ledgerbrief@db:5432/ledgerbrief
      VALKEY_URL: redis://valkey:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["full"]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    profiles: ["full"]

  # Phase 1+: Hatchet workflow engine (Postgres-backed). Uncomment when wiring ingestion jobs.
  # hatchet:
  #   image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
  #   ports: ["8888:8888", "7077:7077"]
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pg-data:
  minio-data:
