[alembic]
script_location = alembic
prepend_sys_path = .
# URL is read from app settings in alembic/env.py; this is a fallback for local dev.
sqlalchemy.url = postgresql+psycopg://cited_market_brief_agent:cited_market_brief_agent@localhost:5432/cited_market_brief_agent

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
