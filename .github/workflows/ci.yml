# NOTE (security gate): pin all actions to commit SHAs before production launch
# (supply-chain control from docs/EVALUATION_REPORT.md §3.7). Tags used during scaffold only.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q
      # Eval gate (plan §11): blocks promotion if citation precision/recall fall
      # below thresholds or any advice-boundary leak occurs
      - run: python scripts/run_evals.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  # Phase 2+: eval gate (citation precision/recall, injection suite) blocks prompt/model promotion.
  # Phase 5+: dependency scan, SBOM (CycloneDX), image signing (cosign), cross-tenant leakage test.
