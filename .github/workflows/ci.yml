# NOTE (security gate): pin all actions to commit SHAs before production launch
# (a supply-chain control). Tags used during scaffold only.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q
      # Eval gate (plan §11): blocks promotion if citation precision/recall fall
      # below thresholds or any advice-boundary leak occurs
      - run: python scripts/run_evals.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_DEMO_MODE: "1"
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Dependency vulnerability scans (launch gate: no high/critical findings)
      - run: python -m pip install --upgrade pip
      - run: pip install -e "./backend[dev]" pip-audit cyclonedx-bom
      # --skip-editable: the local package isn't on PyPI so it can't be audited (and --strict
      # would treat that skip as a failure). pip-audit still exits non-zero on real findings.
      - run: pip-audit --skip-editable || (echo "::warning::pip-audit findings — triage before release" && exit 1)
      - run: cd frontend && npm ci && npm audit --audit-level=high
      # SBOM per release (CycloneDX) — supply-chain control from the evaluation report
      - run: cyclonedx-py environment -o sbom-backend.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-backend.cdx.json

  # Remaining Phase 5+ CI hardening: SHA-pin all actions, cosign image signing,
  # cross-tenant leakage test against a live Postgres service container.
